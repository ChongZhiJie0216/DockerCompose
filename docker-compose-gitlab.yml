version: '3.6'
services:
  web:
    image: 'gitlab/gitlab-ee:latest'
    restart: always
    hostname: 'gitlab.jiecloud.ml'
    environment:
      GITLAB_OMNIBUS_CONFIG: |
        external_url 'http://192.168.0.226:8929'
        gitlab_rails['gitlab_shell_ssh_port'] = 2224
    ports:
      - '8929:8929'
      - '2224:22'
    volumes:
      - '/home/jiecloud/Docker/gitlab/config:/etc/gitlab'
      - '/home/jiecloud/Docker/gitlab/logs:/var/log/gitlab'
      - '/home/jiecloud/Docker/gitlab/data:/var/opt/gitlab'
    shm_size: '256m'
